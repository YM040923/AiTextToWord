name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AiTextToWord.slnx

      - name: Build
        run: dotnet build AiTextToWord.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AiTextToWord.slnx --configuration Release --no-build
